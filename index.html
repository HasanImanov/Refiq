
<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rəfiq – Sosial Xidmətlər Assistantı</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
  <style>
    :root {
      --blue: #1a5fa8;
      --blue-light: #2876cc;
      --blue-pale: #e8f1fb;
      --blue-mid: #c2d9f5;
      --white: #ffffff;
      --gray: #f4f7fb;
      --text: #1a2535;
      --text-muted: #6b7a90;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(26,95,168,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--blue-mid);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(26,95,168,0.08);
    }

    header img { height: 48px; width: auto; }

    .header-text h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 9px; height: 9px;
      background: #28c76f;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* TABS */
    .tabs {
      background: var(--white);
      border-bottom: 2px solid var(--blue-mid);
      display: flex;
      padding: 0 24px;
      gap: 4px;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 12px 20px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: all 0.2s;
      margin-bottom: -2px;
    }

    .tab-btn:hover { color: var(--blue); }

    .tab-btn.active {
      color: var(--blue);
      border-bottom: 3px solid var(--blue);
    }

    /* TAB CONTENT */
    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* CHAT AREA */
    #tab-refiq {
      flex: 1;
      display: none;
      flex-direction: column;
    }
    #tab-refiq.active { display: flex; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 0;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 12px;
      min-height: 0;
      max-height: calc(100vh - 260px);
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      font-weight: 700;
    }

    .avatar.bot {
      background: var(--blue);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
    }

    .avatar.user-av {
      background: var(--blue-mid);
      color: var(--blue);
      font-size: 0.85rem;
    }

    .bubble {
      max-width: 78%;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .bubble.bot {
      background: var(--white);
      border: 1.5px solid var(--blue-mid);
      color: var(--text);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .bubble.user {
      background: var(--blue);
      color: white;
      border-top-right-radius: 4px;
    }

    .loading-bubble {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border: 1.5px solid var(--blue-mid);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 12px 18px;
      max-width: 200px;
      box-shadow: var(--shadow);
    }

    .spinner-wrap {
      position: relative;
      width: 36px; height: 36px;
      flex-shrink: 0;
    }

    .spinner-wrap img {
      width: 28px; height: 28px;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .spinner-ring {
      width: 36px; height: 36px;
      border: 3px solid var(--blue-pale);
      border-top: 3px solid var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.83rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .input-area {
      background: var(--white);
      border-top: 2px solid var(--blue-mid);
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      position: sticky;
      bottom: 0;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid var(--blue-mid);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 130px;
      transition: border 0.2s;
      color: var(--text);
      line-height: 1.5;
    }

    #user-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,95,168,0.10);
    }

    #user-input::placeholder { color: #b0bac8; }

    #send-btn {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #send-btn:hover { background: var(--blue-light); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: #b0bac8; cursor: not-allowed; }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .welcome p { font-size: 0.9rem; line-height: 1.6; }

    #chat-box::-webkit-scrollbar { width: 5px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--blue-mid); border-radius: 10px; }

    .bubble.bot p { margin-bottom: 8px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot strong { color: var(--blue); font-weight: 700; }

    /* ===== ARAYIŞLAR TAB ===== */
    #tab-arayish {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px 16px;
    }

    #tab-arayish.active { display: flex; }

    .arayish-container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }

    .arayish-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 16px;
    }

    .arayish-cats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .cat-btn {
      background: var(--white);
      border: 2px solid var(--blue-mid);
      border-radius: 12px;
      padding: 10px 18px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .cat-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .cat-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }

    .arayish-form {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--blue-mid);
      padding: 24px;
      box-shadow: var(--shadow);
      display: none;
    }

    .arayish-form.active { display: block; }

    .form-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--blue-pale);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input, .form-group select {
      width: 100%;
      border: 1.5px solid var(--blue-mid);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.93rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: var(--text);
      transition: border 0.2s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,95,168,0.10);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hazirla-btn {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 28px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      margin-top: 8px;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    .hazirla-btn:hover { background: var(--blue-light); }
    .hazirla-btn:active { transform: scale(0.98); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo" />
  <div class="header-text">
    <h1>Rəfiq</h1>
    <p><span class="status-dot"></span>Sosial xidmətlər üzrə AI assistant</p>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('refiq')">💬 Rəfiq</button>
  <button class="tab-btn" onclick="switchTab('arayish')">📄 Arayışlar</button>
</div>

<!-- TAB 1: REFIQ -->
<div id="tab-refiq" class="active">
  <main>
    <div id="chat-box">
      <div class="welcome" id="welcome-msg">
        <h2>Salam! Mən Rəfiqəm 👋</h2>
        <p>Reqlament və qanunlar üzrə suallarınızı verin.</p>
      </div>
    </div>
  </main>

  <div class="input-area">
    <textarea id="user-input" placeholder="Sualınızı yazın..." rows="1"></textarea>
    <button id="send-btn">Göndər ➤</button>
  </div>
</div>

<!-- TAB 2: ARAYIŞLAR -->
<div id="tab-arayish">
  <div class="arayish-container">
    <div class="arayish-title">📄 Arayış növünü seçin</div>

    <div class="form-group" style="margin-bottom:28px;">
      <select id="arayish-select" onchange="selectCat(this.value)" style="width:100%;border:2px solid var(--blue-mid);border-radius:12px;padding:13px 16px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);outline:none;cursor:pointer;background:white;">
        <option value="">-- Arayış növünü seçin --</option>
        <option value="yasa-gore">Yaşa görə müavinət</option>
        <option value="defn">Dəfn müavinəti</option>
        <option value="dogum">Doğum müavinəti</option>
        <option value="elillik">Əlilliyə görə müavinət</option>
      </select>
    </div>

    <!-- YAŞA GÖRƏ -->
    <div class="arayish-form" id="form-yasa-gore">
      <div class="form-title">Yaşa görə müavinət arayışı</div>
      <div class="form-row">
        <div class="form-group">
          <label>Soyadı</label>
          <input type="text" id="yg-soyad" placeholder="Həsənov" />
        </div>
        <div class="form-group">
          <label>Adı</label>
          <input type="text" id="yg-ad" placeholder="Həsən" />
        </div>
      </div>
      <div class="form-group">
        <label>Ata adı</label>
        <input type="text" id="yg-ata" placeholder="Elmar oğlu" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>FİN</label>
          <input type="text" id="yg-fin" placeholder="1234567" maxlength="7" />
        </div>
        <div class="form-group">
          <label>Məbləğ (manat)</label>
          <input type="number" id="yg-mebleg" placeholder="220" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Hüququn yaranma tarixi</label>
          <input type="text" id="yg-tarix" placeholder="27.04.2024" />
        </div>
        <div class="form-group">
          <label>Təyinatın bitmə tarixi</label>
          <input type="text" id="yg-bitmə" placeholder="müddətsiz" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>İmzalayan vəzifəsi</label>
          <select id="yg-vezife">
            <option value="Direktor">Direktor</option>
            <option value="Direktor müavini" selected>Direktor müavini</option>
            <option value="Xidmətlər şöbəsinin müdiri">Xidmətlər şöbəsinin müdiri</option>
          </select>
        </div>
        <div class="form-group">
          <label>İmzalayanın adı soyadı</label>
          <input type="text" id="yg-imza" placeholder="Ad Soyad" />
        </div>
      </div>
      <button class="hazirla-btn" onclick="hazirla('yasa-gore')">📥 Arayışı hazırla</button>
    </div>

    <!-- DƏFN -->
    <div class="arayish-form" id="form-defn">
      <div class="form-title">Dəfn müavinəti arayışı</div>
      <div class="form-row">
        <div class="form-group">
          <label>Soyadı</label>
          <input type="text" id="df-soyad" placeholder="Həsənov" />
        </div>
        <div class="form-group">
          <label>Adı</label>
          <input type="text" id="df-ad" placeholder="Həsən" />
        </div>
      </div>
      <div class="form-group">
        <label>Ata adı</label>
        <input type="text" id="df-ata" placeholder="Elmar oğlu" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>FİN</label>
          <input type="text" id="df-fin" placeholder="1234567" maxlength="7" />
        </div>
        <div class="form-group">
          <label>Məbləğ (manat)</label>
          <input type="number" id="df-mebleg" placeholder="600" />
        </div>
      </div>
      <div class="form-group">
        <label>Vəfat tarixi</label>
        <input type="text" id="df-tarix" placeholder="01.01.2024" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>İmzalayan vəzifəsi</label>
          <select id="df-vezife">
            <option value="Direktor">Direktor</option>
            <option value="Direktor müavini" selected>Direktor müavini</option>
            <option value="Xidmətlər şöbəsinin müdiri">Xidmətlər şöbəsinin müdiri</option>
          </select>
        </div>
        <div class="form-group">
          <label>İmzalayanın adı soyadı</label>
          <input type="text" id="df-imza" placeholder="Ad Soyad" />
        </div>
      </div>
      <button class="hazirla-btn" onclick="hazirla('defn')">📥 Arayışı hazırla</button>
    </div>

    <!-- DOĞUM -->
    <div class="arayish-form" id="form-dogum">
      <div class="form-title">Doğum müavinəti arayışı</div>
      <div class="form-row">
        <div class="form-group">
          <label>Soyadı</label>
          <input type="text" id="dg-soyad" placeholder="Həsənov" />
        </div>
        <div class="form-group">
          <label>Adı</label>
          <input type="text" id="dg-ad" placeholder="Həsən" />
        </div>
      </div>
      <div class="form-group">
        <label>Ata adı</label>
        <input type="text" id="dg-ata" placeholder="Elmar oğlu" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>FİN</label>
          <input type="text" id="dg-fin" placeholder="1234567" maxlength="7" />
        </div>
        <div class="form-group">
          <label>Məbləğ (manat)</label>
          <input type="number" id="dg-mebleg" placeholder="300" />
        </div>
      </div>
      <div class="form-group">
        <label>Uşağın doğum tarixi</label>
        <input type="text" id="dg-tarix" placeholder="01.01.2024" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>İmzalayan vəzifəsi</label>
          <select id="dg-vezife">
            <option value="Direktor">Direktor</option>
            <option value="Direktor müavini" selected>Direktor müavini</option>
            <option value="Xidmətlər şöbəsinin müdiri">Xidmətlər şöbəsinin müdiri</option>
          </select>
        </div>
        <div class="form-group">
          <label>İmzalayanın adı soyadı</label>
          <input type="text" id="dg-imza" placeholder="Ad Soyad" />
        </div>
      </div>
      <button class="hazirla-btn" onclick="hazirla('dogum')">📥 Arayışı hazırla</button>
    </div>

    <!-- ƏLİLLİK -->
    <div class="arayish-form" id="form-elillik">
      <div class="form-title">Əlilliyə görə müavinət arayışı</div>
      <div class="form-row">
        <div class="form-group">
          <label>Soyadı</label>
          <input type="text" id="el-soyad" placeholder="Həsənov" />
        </div>
        <div class="form-group">
          <label>Adı</label>
          <input type="text" id="el-ad" placeholder="Həsən" />
        </div>
      </div>
      <div class="form-group">
        <label>Ata adı</label>
        <input type="text" id="el-ata" placeholder="Elmar oğlu" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>FİN</label>
          <input type="text" id="el-fin" placeholder="1234567" maxlength="7" />
        </div>
        <div class="form-group">
          <label>Məbləğ (manat)</label>
          <input type="number" id="el-mebleg" placeholder="180" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Əlillik qrupu</label>
          <select id="el-qrup">
            <option value="I">I qrup</option>
            <option value="II">II qrup</option>
            <option value="III">III qrup</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bitmə tarixi</label>
          <input type="text" id="el-bitmə" placeholder="müddətsiz" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>İmzalayan vəzifəsi</label>
          <select id="el-vezife">
            <option value="Direktor">Direktor</option>
            <option value="Direktor müavini" selected>Direktor müavini</option>
            <option value="Xidmətlər şöbəsinin müdiri">Xidmətlər şöbəsinin müdiri</option>
          </select>
        </div>
        <div class="form-group">
          <label>İmzalayanın adı soyadı</label>
          <input type="text" id="el-imza" placeholder="Ad Soyad" />
        </div>
      </div>
      <button class="hazirla-btn" onclick="hazirla('elillik')">📥 Arayışı hazırla</button>
    </div>

    <div class="empty-state" id="empty-state">
      <span>📋</span>
      Yuxarıdan arayış növünü seçin
    </div>
  </div>
</div>

<script>
  // ===== TAB SİSTEMİ =====
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'refiq') || (i === 1 && tab === 'arayish'));
    });
    document.getElementById('tab-refiq').classList.toggle('active', tab === 'refiq');
    document.getElementById('tab-arayish').classList.toggle('active', tab === 'arayish');
  }

  // ===== KATEQORİYA SEÇİMİ =====
  function selectCat(cat) {
    document.querySelectorAll('.arayish-form').forEach(f => f.classList.remove('active'));
    if (!cat) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('form-' + cat).classList.add('active');
  }

  // ===== RƏQƏMI HƏRFLƏ =====
  function numberToWords(n) {
    n = parseInt(n);
    if (isNaN(n)) return '';
    const birler = ['', 'bir', 'iki', 'üç', 'dörd', 'beş', 'altı', 'yeddi', 'səkkiz', 'doqquz'];
    const onlar = ['', 'on', 'iyirmi', 'otuz', 'qırx', 'əlli', 'altmış', 'yetmiş', 'səksən', 'doxsan'];
    const yuzler = ['', 'yüz', 'iki yüz', 'üç yüz', 'dörd yüz', 'beş yüz', 'altı yüz', 'yeddi yüz', 'səkkiz yüz', 'doqquz yüz'];
    if (n === 0) return 'sıfır';
    let result = '';
    if (n >= 1000) {
      const k = Math.floor(n / 1000);
      result += (k === 1 ? 'min' : birler[k] + ' min') + ' ';
      n %= 1000;
    }
    if (n >= 100) { result += yuzler[Math.floor(n / 100)] + ' '; n %= 100; }
    if (n >= 10) { result += onlar[Math.floor(n / 10)] + ' '; n %= 10; }
    if (n > 0) result += birler[n];
    return result.trim();
  }

  // ===== CHAT =====
  let conversationHistory = [];
  const chatBox = document.getElementById("chat-box");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function addMessage(role, text) {
    const welcome = document.getElementById("welcome-msg");
    if (welcome) welcome.remove();
    const msg = document.createElement("div");
    msg.className = `msg ${role === "user" ? "user" : "bot-msg"}`;
    const avatar = document.createElement("div");
    avatar.className = `avatar ${role === "user" ? "user-av" : "bot"}`;
    avatar.textContent = role === "user" ? "Siz" : "R";
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role === "user" ? "user" : "bot"}`;
    if (role === "assistant") {
      bubble.innerHTML = formatText(text);
    } else {
      bubble.textContent = text;
    }
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n\n/g, "</p><p>")
      .replace(/\n/g, "<br/>")
      .replace(/^/, "<p>")
      .replace(/$/, "</p>");
  }

  function showLoading() {
    const welcome = document.getElementById("welcome-msg");
    if (welcome) welcome.remove();
    const msg = document.createElement("div");
    msg.className = "msg bot-msg";
    msg.id = "loading-msg";
    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "R";
    const loadDiv = document.createElement("div");
    loadDiv.className = "loading-bubble";
    loadDiv.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner-ring"></div>
        <img src="logo.png" alt="logo" />
      </div>
      <span class="loading-text">Axtarıram...</span>
    `;
    msg.appendChild(avatar);
    msg.appendChild(loadDiv);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideLoading() {
    const loading = document.getElementById("loading-msg");
    if (loading) loading.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    addMessage("user", text);
    showLoading();
    try {
      conversationHistory.push({ role: "user", content: text });
      const systemPrompt = `Sən "Rəfiq" adlı sosial xidmətlər üzrə ixtisaslaşmış AI assistantsan.
Sənə verilən PDF sənədlər (reqlamentlər və qanunlar) əsasında cavab verirsən.
CAVAB FORMATI:
1. Əvvəlcə reqlamentdən cavabı yaz: "**Reqlamentə əsasən:** ..."
2. Sonra qanuni əsası göstər: "**Qanunun X maddəsinin Y bəndinə əsasən:** burda belə deyilir..."
3. Sənədlərdə məlumat yoxdursa, bunu açıq bildir.
Yalnız sənədlərdəki məlumata əsaslan. Azərbaycan dilində cavab ver.`;
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory, system: systemPrompt })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const reply = data.content.map(b => b.text || "").join("\n");
      conversationHistory.push({ role: "assistant", content: reply });
      hideLoading();
      addMessage("assistant", reply);
    } catch (err) {
      hideLoading();
      addMessage("assistant", `❌ Xəta baş verdi: ${err.message}`);
      conversationHistory.pop();
    }
    sendBtn.disabled = false;
    userInput.focus();
  }

  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 130) + "px";
  });

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);
</script>
