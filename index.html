
<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rəfiq – Sosial Xidmətlər Assistantı</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="/docx.js"></script>
  <style>
    :root{--blue:#1a5fa8;--blue-light:#2876cc;--blue-pale:#e8f1fb;--blue-mid:#c2d9f5;--white:#ffffff;--gray:#f4f7fb;--text:#1a2535;--text-muted:#6b7a90;--radius:16px;--shadow:0 4px 24px rgba(26,95,168,0.10);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    header{background:var(--white);border-bottom:2px solid var(--blue-mid);padding:14px 28px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(26,95,168,0.08);}
    header img{height:48px;width:auto;}
    .header-text h1{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:800;color:var(--blue);letter-spacing:-0.3px;}
    .header-text p{font-size:0.78rem;color:var(--text-muted);margin-top:1px;}
    .status-dot{width:9px;height:9px;background:#28c76f;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    .tabs{background:var(--white);border-bottom:2px solid var(--blue-mid);display:flex;padding:0 24px;gap:4px;}
    .tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:12px 20px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;color:var(--text-muted);transition:all 0.2s;margin-bottom:-2px;}
    .tab-btn:hover{color:var(--blue);}
    .tab-btn.active{color:var(--blue);border-bottom:3px solid var(--blue);}
    #tab-refiq{flex:1;display:none;flex-direction:column;}
    #tab-refiq.active{display:flex;}
    main{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;padding:24px 16px 0;}
    #chat-box{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding-bottom:12px;min-height:0;max-height:calc(100vh - 260px);}
    .msg{display:flex;gap:10px;align-items:flex-start;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .msg.user{flex-direction:row-reverse;}
    .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;font-weight:700;}
    .avatar.bot{background:var(--blue);color:white;font-family:'Nunito',sans-serif;font-size:0.85rem;}
    .avatar.user-av{background:var(--blue-mid);color:var(--blue);font-size:0.85rem;}
    .bubble{max-width:78%;padding:13px 18px;border-radius:var(--radius);font-size:0.92rem;line-height:1.65;}
    .bubble.bot{background:var(--white);border:1.5px solid var(--blue-mid);color:var(--text);border-top-left-radius:4px;box-shadow:var(--shadow);}
    .bubble.user{background:var(--blue);color:white;border-top-right-radius:4px;}
    .loading-bubble{display:flex;align-items:center;gap:14px;background:var(--white);border:1.5px solid var(--blue-mid);border-radius:var(--radius);border-top-left-radius:4px;padding:12px 18px;max-width:200px;box-shadow:var(--shadow);}
    .spinner-wrap{position:relative;width:36px;height:36px;flex-shrink:0;}
    .spinner-wrap img{width:28px;height:28px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .spinner-ring{width:36px;height:36px;border:3px solid var(--blue-pale);border-top:3px solid var(--blue);border-radius:50%;animation:spin 0.9s linear infinite;}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .loading-text{font-size:0.83rem;color:var(--text-muted);font-style:italic;}
    .input-area{background:var(--white);border-top:2px solid var(--blue-mid);padding:16px;display:flex;gap:10px;align-items:flex-end;position:sticky;bottom:0;}
    #user-input{flex:1;border:1.5px solid var(--blue-mid);border-radius:12px;padding:12px 16px;font-size:16px;font-family:'Inter',sans-serif;resize:none;outline:none;min-height:46px;max-height:130px;transition:border 0.2s;color:var(--text);line-height:1.5;}
    #user-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,0.10);}
    #user-input::placeholder{color:#b0bac8;}
    #send-btn{background:var(--blue);color:white;border:none;border-radius:12px;padding:12px 20px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;display:flex;align-items:center;gap:6px;transition:background 0.2s,transform 0.1s;white-space:nowrap;}
    #send-btn:hover{background:var(--blue-light);}
    #send-btn:active{transform:scale(0.97);}
    #send-btn:disabled{background:#b0bac8;cursor:not-allowed;}
    .welcome{text-align:center;padding:40px 20px;color:var(--text-muted);}
    .welcome h2{font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:800;color:var(--blue);margin-bottom:8px;}
    .welcome p{font-size:0.9rem;line-height:1.6;}
    #chat-box::-webkit-scrollbar{width:5px;}
    #chat-box::-webkit-scrollbar-track{background:transparent;}
    #chat-box::-webkit-scrollbar-thumb{background:var(--blue-mid);border-radius:10px;}
    .bubble.bot p{margin-bottom:8px;}
    .bubble.bot p:last-child{margin-bottom:0;}
    .bubble.bot strong{color:var(--blue);font-weight:700;}
    #tab-arayish{flex:1;display:none;flex-direction:column;overflow-y:auto;padding:24px 16px;}
    #tab-arayish.active{display:flex;}
    .arayish-container{max-width:700px;width:100%;margin:0 auto;}
    .arayish-title{font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;color:var(--blue);margin-bottom:16px;}
    .arayish-form{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--blue-mid);padding:24px;box-shadow:var(--shadow);display:none;}
    .arayish-form.active{display:block;}
    .form-title{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:var(--blue);margin-bottom:20px;padding-bottom:12px;border-bottom:1.5px solid var(--blue-pale);}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
    .form-group input,.form-group select{width:100%;border:1.5px solid var(--blue-mid);border-radius:10px;padding:11px 14px;font-size:0.93rem;font-family:'Inter',sans-serif;outline:none;color:var(--text);transition:border 0.2s;}
    .form-group input:focus,.form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,0.10);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
    .hazirla-btn{background:var(--blue);color:white;border:none;border-radius:12px;padding:13px 20px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;transition:background 0.2s,transform 0.1s;width:100%;}
    .hazirla-btn:hover{background:var(--blue-light);}
    .hazirla-btn:active{transform:scale(0.98);}
    .hazirla-btn.pdf-btn{background:#e53e3e;}
    .hazirla-btn.pdf-btn:hover{background:#c53030;}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.9rem;}
    .empty-state span{font-size:2.5rem;display:block;margin-bottom:12px;}
    #tab-erize{flex:1;display:none;flex-direction:column;overflow-y:auto;padding:24px 16px;}
    #tab-erize.active{display:flex;}
    .erize-container{max-width:700px;width:100%;margin:0 auto;}
    @media(max-width:500px){.form-row{grid-template-columns:1fr;}.btn-group{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <img src="logo.png" alt="Logo"/>
  <div class="header-text"><h1>Rəfiq</h1><p><span class="status-dot"></span>Sosial xidmətlər üzrə AI assistant</p></div>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('refiq')">💬 Rəfiq</button>
  <button class="tab-btn" onclick="switchTab('arayish')">📄 Arayışlar</button>
  <button class="tab-btn" onclick="switchTab('erize')">📝 Ərizələr</button>
</div>
<div id="tab-refiq" class="active">
  <main>
    <div id="chat-box">
      <div class="welcome" id="welcome-msg">
        <h2>Salam! Mən Rəfiqəm 👋</h2>
        <p>Reqlament və qanunlar üzrə suallarınızı verin.</p>
      </div>
    </div>
  </main>
  <div class="input-area">
    <textarea id="user-input" placeholder="Sualınızı yazın..." rows="1"></textarea>
    <button id="send-btn">Göndər ➤</button>
  </div>
</div>
<div id="tab-arayish">
  <div class="arayish-container">
    <div class="arayish-title">📄 Arayış növünü seçin</div>
    <div class="form-group" style="margin-bottom:28px;">
      <select id="arayish-select" onchange="selectCat(this.value)" style="width:100%;border:2px solid var(--blue-mid);border-radius:12px;padding:13px 16px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);outline:none;cursor:pointer;background:white;">
        <option value="">-- Arayış növünü seçin --</option>
        <option value="yasa-gore">Yaşa görə müavinət</option>

      <div class="form-title">Yaşa görə müavinət arayışı</div>

        <div class="form-group"><label>Soyadı</label><input type="text" id="yg-soyad" placeholder="Həsənov"/></div>
        <div class="form-group"><label>Adı</label><input type="text" id="yg-ad" placeholder="Həsən"/></div>
      </div>
      <div class="form-group"><label>Ata adı</label><input type="text" id="yg-ata" placeholder="Elmar oğlu"/></div>
      <div class="form-row">
        <div class="form-group"><label>FİN</label><input type="text" id="yg-fin" placeholder="1234567" maxlength="7"/></div>
        <div class="form-group"><label>Məbləğ (manat)</label><input type="number" id="yg-mebleg" placeholder="220"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Hüququn yaranma tarixi</label><input type="text" id="yg-tarix" placeholder="27.04.2024" maxlength="10" /></div>
        <div class="form-group"><label>Təyinatın bitmə tarixi</label><input type="text" id="yg-bitme" placeholder="müddətsiz" maxlength="10"/></div>
      </div>
      <div class="form-group"><label>Tələb olunan yer</label><input type="text" id="yg-yer" placeholder="məsələn: tələb olan yerə"/></div>

        <div class="form-group"><label>İmzalayan vəzifəsi</label>
          <select id="yg-vezife" onchange="vezifeSec(this,'yg-imza')">

            <option value="Direktor müavini" selected>Direktor müavini</option>

          </select>
        </div>
        <div class="form-group"><label>İmzalayanın adı soyadı</label><input type="text" id="yg-imza" placeholder="Ad Soyad"/></div>
      </div>
      <div class="form-group" style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;">
          <input type="checkbox" id="yg-etibar" onchange="toggleEtibar('yg')" style="width:18px;height:18px;cursor:pointer;"/>
          Etibarnamə ilə müraciət
        </label>
        <div id="yg-etibar-box" style="display:none;margin-top:10px;">
          <input type="text" id="yg-etibar-ad" placeholder="Səlahiyyətli nümayəndənin adı soyadı ata adı" style="width:100%;border:1.5px solid var(--blue-mid);border-radius:10px;padding:11px 14px;font-size:0.93rem;font-family:'Inter',sans-serif;outline:none;color:var(--text);"/>
        </div>
      </div>
      <div class="btn-group">
        <button class="hazirla-btn" onclick="hazirla('yasa-gore','word')">📄 Word yüklə</button>
        <button class="hazirla-btn pdf-btn" onclick="hazirla('yasa-gore','pdf')">📋 PDF yüklə</button>

    </div>
    <div class="arayish-form" id="form-elillik">
      <div class="form-title">Əlilliyə görə müavinət arayışı</div>
      <div class="form-row">
        <div class="form-group"><label>Soyadı</label><input type="text" id="el-soyad" placeholder="Həsənov"/></div>
        <div class="form-group"><label>Adı</label><input type="text" id="el-ad" placeholder="Həsən"/></div>
      </div>
      <div class="form-group"><label>Ata adı</label><input type="text" id="el-ata" placeholder="Elmar oğlu"/></div>
      <div class="form-row">
        <div class="form-group"><label>FİN</label><input type="text" id="el-fin" placeholder="1234567" maxlength="7"/></div>
        <div class="form-group"><label>Məbləğ (manat)</label><input type="number" id="el-mebleg" placeholder="180"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Əlillik qrupu</label>
          <select id="el-qrup"><option value="I">I qrup</option><option value="II">II qrup</option><option value="III">III qrup</option></select>
        </div>
        <div class="form-group"><label>Bitmə tarixi</label><input type="text" id="el-bitme" placeholder="müddətsiz" maxlength="10"/></div>
      </div>
      <div class="form-group"><label>Tələb olunan yer</label><input type="text" id="el-yer" placeholder="məsələn: bank filialına"/></div>
      <div class="form-row">
        <div class="form-group"><label>İmzalayan vəzifəsi</label>
          <select id="el-vezife" onchange="vezifeSec(this,'el-imza')">
            <option value="Direktor">Direktor</option>
            <option value="Direktor müavini" selected>Direktor müavini</option>
            <option value="Xidmətlər şöbəsinin müdiri">Xidmətlər şöbəsinin müdiri</option>
          </select>
        </div>
        <div class="form-group"><label>İmzalayanın adı soyadı</label><input type="text" id="el-imza" placeholder="Ad Soyad"/></div>
      </div>
      <div class="form-group" style="margin-top:8px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;">
          <input type="checkbox" id="el-etibar" onchange="toggleEtibar('el')" style="width:18px;height:18px;cursor:pointer;"/>
          Etibarnamə ilə müraciət
        </label>
        <div id="el-etibar-box" style="display:none;margin-top:10px;">
          <input type="text" id="el-etibar-ad" placeholder="Səlahiyyətli nümayəndənin adı soyadı ata adı" style="width:100%;border:1.5px solid var(--blue-mid);border-radius:10px;padding:11px 14px;font-size:0.93rem;font-family:'Inter',sans-serif;outline:none;color:var(--text);"/>

      </div>
      <div class="btn-group">
        <button class="hazirla-btn" onclick="hazirla('elillik','word')">📄 Word yüklə</button>

<div id="tab-erize">
  <div class="erize-container">
    <div class="arayish-title">📝 Ərizə növünü seçin</div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="hazirla-btn" style="width:auto;padding:10px 20px;" onclick="selectErize('defn')">⚰️ Dəfn xərci</button>
    </div>
    <div class="arayish-form" id="erize-defn">
      <div class="form-title">Dəfn xərci üzrə müavinət ərizəsi</div>
      <div class="form-row">
        <div class="form-group"><label>Ərizəçinin soyadı</label><input type="text" id="df-soyad" placeholder="Ağazadə" oninput="azTitleInput(this)"/></div>

      <div class="form-row">
        <div class="form-group"><label>Pensiya hesab №</label><input type="text" id="df-hesab" placeholder="064426"/></div>
        <div class="form-group"><label>Telefon nömrəsi</label><input type="text" id="df-tel" placeholder="051 3653394"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Vəfat edəninin kimim olduğu</label>
          <select id="df-qohum">
            <option value="atam">atam</option>
            <option value="anam">anam</option>
            <option value="qardaşım">qardaşım</option>
            <option value="bacım">bacım</option>
            <option value="həyat yoldaşım">həyat yoldaşım</option>
            <option value="övladım">övladım</option>
            <option value="qohumum">qohumum</option>
            <option value="qonşum">qonşum</option>
          </select>
        </div>
        <div class="form-group"><label>Vəfat edənin adı soyadı ata adı</label><input type="text" id="df-vefat-ad" placeholder="Ağayev Vaqif Yaqub oğlu" oninput="formatVefatAd(this)"/></div>
        <div class="form-group"><label>Vəfat tarixi</label><input type="text" id="df-vefat-tarix" placeholder="22.09.2025" maxlength="10"/></div>
      </div>
      <div class="form-group"><label>Hara ünvanlanır</label>
        <select id="df-unvan">
          <option value="Xüsusi Şərtlərə Təyinat üzrə Mərkəzi Filialına">Xüsusi Şərtlərə Təyinat üzrə Mərkəzi Filialına</option>
          <option value="Maliyyə və Mühasibatlıq üzrə Mərkəzi Filialına">Maliyyə və Mühasibatlıq üzrə Mərkəzi Filialına</option>
          <option value="Sosial Ödənişlərin Təyinatı üzrə Mərkəzi Filialına">Sosial Ödənişlərin Təyinatı üzrə Mərkəzi Filialına</option>
        </select>
      </div>
      <div class="btn-group" style="grid-template-columns:1fr;">
        <button class="hazirla-btn" onclick="hazirlaErize('defn','word')">📄 Word yüklə</button>
      </div>
    </div>
  </div>
</div>
<script>
  // Azərbaycan əlifbasını dəstəkləyən InitCap funksiyası
  // "HASAN IMANOV KAMRAN" → "Hasan Imanov Kamran"
  function toInitCap(str){
    if(!str) return '';
    var azMap={
      'a':'A','b':'B','c':'C','ç':'Ç','d':'D','e':'E','ə':'Ə',
      'f':'F','g':'G','ğ':'Ğ','h':'H','x':'X','i':'İ','ı':'I',
      'j':'J','k':'K','l':'L','m':'M','n':'N','o':'O','ö':'Ö',
      'p':'P','q':'Q','r':'R','s':'S','ş':'Ş','t':'T','u':'U',
      'ü':'Ü','v':'V','y':'Y','z':'Z'
    };
    var azLower={
      'A':'a','B':'b','C':'c','Ç':'ç','D':'d','E':'e','Ə':'ə',
      'F':'f','G':'g','Ğ':'ğ','H':'h','X':'x','İ':'i','I':'ı',
      'J':'j','K':'k','L':'l','M':'m','N':'n','O':'o','Ö':'ö',
      'P':'p','Q':'q','R':'r','S':'s','Ş':'ş','T':'t','U':'u',
      'Ü':'ü','V':'v','Y':'y','Z':'z'
    };
    var lowercase = ['oğlu','qızı'];
    return str.trim().split(/\s+/).map(function(word){
      if(!word) return '';
      // əvvəlcə sözü tam kiçilt
      var wordLower = word.split('').map(function(ch){
        return azLower[ch] || ch.toLowerCase();
      }).join('');
      // oğlu / qızı həmişə kiçik qalsın
      if(lowercase.indexOf(wordLower) !== -1) return wordLower;
      // digər sözlər: birinci hərf böyük
      var upper = azMap[wordLower.charAt(0)] || wordLower.charAt(0).toUpperCase();
      return upper + wordLower.slice(1);
    }).join(' ');
  }

  // Ad/soyad/ata inputlarına avtomatik initCap tətbiq et
  function applyInitCap(inputId){
    var el = document.getElementById(inputId);
    if(!el) return;
    el.addEventListener('blur', function(){
      this.value = toInitCap(this.value);
    });
  }

  window.addEventListener('DOMContentLoaded', function(){
    // Yaşa görə arayış inputları
    applyInitCap('yg-soyad');
    applyInitCap('yg-ad');
    applyInitCap('yg-ata');
    applyInitCap('yg-imza');
    // Əlilliyə görə arayış inputları
    applyInitCap('el-soyad');
    applyInitCap('el-ad');
    applyInitCap('el-ata');
    applyInitCap('el-imza');
    // Tarix inputlarına mask tətbiq et
    ['yg-tarix','yg-bitme','el-bitme'].forEach(function(id){

  function vezifeSec(selectEl, inputId) {
    var ad = VEZIFE_AD[selectEl.value] || '';
    document.getElementById(inputId).value = ad;
  }

  function tarixMask(el) {
    el.addEventListener('input', function(e) {
      var v = this.value.replace(/\D/g, '').slice(0, 8);
      var out = '';
      if(v.length >= 1) out = v.slice(0,2);
      if(v.length >= 3) out += '.' + v.slice(2,4);
      if(v.length >= 5) out += '.' + v.slice(4,8);
      this.value = out;
    });
    el.addEventListener('keydown', function(e) {
      if(e.key === 'Backspace') {
        var v = this.value;
        if(v.endsWith('.')) this.value = v.slice(0,-1);
      }
    });
  }

  function toggleEtibar(prefix){

  function switchTab(tab){

    document.getElementById('tab-arayish').classList.toggle('active',tab==='arayish');
    document.getElementById('tab-erize').classList.toggle('active',tab==='erize');

  function n2w(n){
    var s=String(n);
    var parts=s.split('.');
    var manats=parseInt(parts[0]);
    var qepik=0;
    if(parts[1]){
      var q=parts[1].substring(0,2);
      if(q.length===1)q=q+'0';
      qepik=parseInt(q);
    }
    var result=n2wInt(manats)+' manat';
    if(qepik>0)result+=' '+n2wInt(qepik)+' qəpik';
    return result;
  }
  function n2wInt(n){
    n=parseInt(n);if(isNaN(n))return'';
    var b=['','bir','iki','üç','dörd','beş','altı','yeddi','səkkiz','doqquz'];
    var o=['','on','iyirmi','otuz','qırx','əlli','altmış','yetmiş','səksən','doxsan'];
    var y=['','yüz','iki yüz','üç yüz','dörd yüz','beş yüz','altı yüz','yeddi yüz','səkkiz yüz','doqquz yüz'];
    if(n===0)return'sıfır';var r='';
    if(n>=10000){var onMin=Math.floor(n/10000);r+=o[onMin]+' min ';n%=10000;}
    if(n>=1000){var k=Math.floor(n/1000);r+=(k===1?'min':b[k]+' min')+' ';n%=1000;}
    if(n>=100){r+=y[Math.floor(n/100)]+' ';n%=100;}
    if(n>=10){r+=o[Math.floor(n/10)]+' ';n%=10;}
    if(n>0)r+=b[n];return r.trim();
  }

  function getData(tip){
    var d={};
    if(tip==='yasa-gore'){
      d.fin=document.getElementById('yg-fin').value.trim();
      d.mebleg=document.getElementById('yg-mebleg').value.trim();
      d.vezife=document.getElementById('yg-vezife').value;
      d.imza=document.getElementById('yg-imza').value.trim()||'XXXX XXXX';
      d.tarix=document.getElementById('yg-tarix').value.trim();
      d.bitme=document.getElementById('yg-bitme').value.trim()||'müddətsiz';
      d.yer=document.getElementById('yg-yer').value.trim();
      d.fullAd=toInitCap(document.getElementById('yg-soyad').value)+' '+toInitCap(document.getElementById('yg-ad').value)+' '+toInitCap(document.getElementById('yg-ata').value);
      d.metn=d.fullAd+' (FİN '+d.fin+') Azərbaycan Respublikasının Əmək və Əhalinin Sosial Müdafiəsi Nazirliyinin Mərkəzləşdirilmiş elektron informasiya sisteminin \u201cSosial ödənişlər\u201d altsisteminə əsasən Nazirliyin tabeliyindəki Dövlət Sosial Müdafiə Fondundan yaşa görə '+d.mebleg+' manat ('+n2w(d.mebleg)+') məbləğində sosial müavinət alır.';
      d.tarixMetn=d.tarix?'Hüququn yaranma tarixi: '+d.tarix+'-'+ilShekilchi(d.tarix)+' il':'';
    } else {
      d.fin=document.getElementById('el-fin').value.trim();
      d.mebleg=document.getElementById('el-mebleg').value.trim();
      d.vezife=document.getElementById('el-vezife').value;
      d.imza=document.getElementById('el-imza').value.trim()||'XXXX XXXX';
      d.qrup=document.getElementById('el-qrup').value;
      d.bitme=document.getElementById('el-bitme').value.trim()||'müddətsiz';
      d.yer=document.getElementById('el-yer').value.trim();
      d.fullAd=toInitCap(document.getElementById('el-soyad').value)+' '+toInitCap(document.getElementById('el-ad').value)+' '+toInitCap(document.getElementById('el-ata').value);
      d.metn=d.fullAd+' (FİN '+d.fin+') Azərbaycan Respublikasının Əmək və Əhalinin Sosial Müdafiəsi Nazirliyinin Mərkəzləşdirilmiş elektron informasiya sisteminin \u201cSosial ödənişlər\u201d altsisteminə əsasən Nazirliyin tabeliyindəki Dövlət Sosial Müdafiə Fondundan əlilliyə görə ('+d.qrup+' qrup) '+d.mebleg+' manat ('+n2w(d.mebleg)+') məbləğində sosial müavinət alır.';
      d.tarixMetn='';
    }
    d.yerMetn=d.yer?'Arayış '+d.yer+' təqdim etmək üçün verilir.':'Arayış tələb olunan yerə təqdim etmək üçün verilir.';
    return d;
  }

  // Boş sətir - spacing:0 ki xəttə yapışsın
  function ep0(){return new docx.Paragraph({spacing:{before:0,after:0,line:240},children:[new docx.TextRun('')]});}
  // Normal boş sətir
  function ep(){return new docx.Paragraph({spacing:{after:0,line:240},children:[new docx.TextRun('')]});}

  async function buildChildren(d,withHeader){
    var P=docx.Paragraph,T=docx.TextRun,A=docx.AlignmentType,I=docx.ImageRun,TS=docx.TabStopType;
    var ch=[];

    if(withHeader){
      var hbRes=await fetch('header.jpg');
      var hbBuf=await hbRes.arrayBuffer();
      var hb=new Uint8Array(hbBuf);
      ch.push(new P({alignment:A.CENTER,spacing:{before:0,after:0,line:240},indent:{left:-1418,right:-656},
        children:[new I({data:hb,transformation:{width:518,height:220},type:'jpg'})]}));
      for(var i=0;i<2;i++)ch.push(ep());
    } else {
      // Word - 20 boş sətir
      for(var i=0;i<20;i++)ch.push(ep());
    }

    // ARAYIŞ
    ch.push(new P({alignment:A.CENTER,spacing:{before:0,after:200,line:240},
      children:[new T({text:'ARAYIŞ',font:'Arial',size:24,bold:true})]}));
    // Əsas mətn - firstLine indent
    ch.push(new P({alignment:A.BOTH,spacing:{before:0,after:0,line:220},indent:{firstLine:708},
      children:[new T({text:d.metn,font:'Arial',size:24})]}));
    // Hüququn yaranma tarixi
    if(d.tarixMetn){
      ch.push(new P({spacing:{before:120,after:0,line:220},indent:{firstLine:708},
        children:[new T({text:d.tarixMetn,font:'Arial',size:24})]}));
    }
    // Bitmə tarixi
    ch.push(new P({spacing:{after:0,line:240},indent:{firstLine:708},
      children:[new T({text:'T\u0259yinat\u0131n bitm\u0259 tarixi: '+d.bitme+'.',font:'Arial',size:24})]}));
    ch.push(ep());
    // Tələb olunan yer
    ch.push(new P({spacing:{before:120,after:0,line:220},indent:{firstLine:708},
      children:[new T({text:d.yerMetn,font:'Arial',size:24})]}));
    ch.push(ep());ch.push(ep());
    // İmza - indent YOX, tam sol-sağ kənarlara
    ch.push(new P({
      spacing:{after:0,line:240},
      indent:{left:2140},
      tabStops:[{type:docx.TabStopType.RIGHT,position:9354}],
      children:[
        new T({text:d.vezife,font:'Arial',size:24,bold:true}),
        new T({text:'\t'+d.imza,font:'Arial',size:24,bold:true})
      ]
    }));
    return ch;
  }

  function showLoading(){

    var msg=document.createElement('div');msg.className='msg bot-msg';msg.id='loading-msg';
    var av=document.createElement('div');av.className='avatar bot';av.textContent='R';
    var ld=document.createElement('div');ld.className='loading-bubble';
    ld.innerHTML='<div class="spinner-wrap"><div class="spinner-ring"></div><img src="logo.png" alt="logo"/></div><span class="loading-text">Axtarıram...</span>';
    msg.appendChild(av);msg.appendChild(ld);chatBox.appendChild(msg);chatBox.scrollTop=chatBox.scrollHeight;
  }
  function hideLoading(){var l=document.getElementById('loading-msg');if(l)l.remove();}
  async function sendMessage(){
    var text=userInput.value.trim();if(!text)return;
    userInput.value='';userInput.style.height='auto';sendBtn.disabled=true;
    addMessage('user',text);showLoading();
    try{
      conversationHistory.push({role:'user',content:text});
      var sys='Sən "Rəfiq" adlı sosial xidmətlər üzrə ixtisaslaşmış AI assistantsan. Sənə verilən PDF sənədlər əsasında cavab verirsən. CAVAB FORMATI: 1. "**Reqlamentə əsasən:** ..." 2. "**Qanunun X maddəsinin Y bəndinə əsasən:** ..." 3. Məlumat yoxdursa açıq bildir. Yalnız sənədlərə əsaslan. Azərbaycan dilində cavab ver.';
      var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:conversationHistory,system:sys})});
      var data=await r.json();
      if(data.error)throw new Error(data.error.message);
      var reply=data.content.map(function(b){return b.text||'';}).join('\n');
      conversationHistory.push({role:'assistant',content:reply});
      hideLoading();addMessage('assistant',reply);
    }catch(err){hideLoading();addMessage('assistant','❌ Xəta baş verdi: '+err.message);conversationHistory.pop();}
    sendBtn.disabled=false;userInput.focus();
  }
  userInput.addEventListener('input',function(){userInput.style.height='auto';userInput.style.height=Math.min(userInput.scrollHeight,130)+'px';});
  userInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  sendBtn.addEventListener('click',sendMessage);
</script>

<script>
  var AZ_UPPER={'a':'A','b':'B','c':'C','ç':'Ç','d':'D','e':'E','ə':'Ə','f':'F','g':'G','ğ':'Ğ','h':'H','x':'X','i':'İ','ı':'I','j':'J','k':'K','q':'Q','l':'L','m':'M','n':'N','o':'O','ö':'Ö','p':'P','r':'R','s':'S','ş':'Ş','t':'T','u':'U','ü':'Ü','v':'V','y':'Y','z':'Z'};
  var AZ_LOWER={'İ':'i','I':'ı','Ə':'ə','Ğ':'ğ','Ç':'ç','Ş':'ş','Ö':'ö','Ü':'ü'};
  function azUpper(ch){return AZ_UPPER[ch]||ch.toUpperCase();}
  function azLower(ch){return AZ_LOWER[ch]||ch.toLowerCase();}
  function azTitleWord(w){if(!w)return w;return azUpper(w[0])+w.slice(1).split('').map(azLower).join('');}
  function azTitleInput(el){
    var pos=el.selectionStart;
    var result=el.value.replace(/\S+/g,function(w){return azTitleWord(w);});
    el.value=result;el.setSelectionRange(pos,pos);
  }
  function formatVefatAd(el){
    var pos=el.selectionStart;
    var skip=['oğlu','qızı'];
    var result=el.value.replace(/\S+/g,function(w){
      return skip.indexOf(w.split('').map(azLower).join(''))>=0?w.split('').map(azLower).join(''):azTitleWord(w);
    });
    el.value=result;el.setSelectionRange(pos,pos);
  }
  var UNVAN_SUFFIX=['şəhəri','rayonu','qəsəbəsi','kəndi','dalan','ev','mənzil','küçəsi','prospekti','küçə','prospekt'];
  function formatUnvan(el){
    var parts=el.value.split(',');
    var result=parts.map(function(part){
      var words=part.trim().split(/\s+/);
      return words.map(function(w){
        if(!w)return w;
        var wl=w.split('').map(azLower).join('');
        if(UNVAN_SUFFIX.indexOf(wl)>=0)return wl;
        if(/^\d/.test(w))return w;
        return azTitleWord(w);
      }).join(' ');
    });
    el.value=result.join(', ');
  }
